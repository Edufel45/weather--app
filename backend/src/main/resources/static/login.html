<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Weather App</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <video autoplay muted loop playsinline class="video-background" id="bgVideo">
        <source src="/videos/background.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>
    
    <div class="auth-container">
        <div class="auth-card">
            <h2>🌤️ Weather App</h2>
            <h3>Login</h3>
            <div id="errorMsg" class="error-msg"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label> Email</label>
                    <input type="email" id="email" required placeholder="your@email.com">
                </div>
                <div class="form-group password-group">
                    <label> Password</label>
                    <div style="position: relative;">
                        <input type="password" id="password" required placeholder="••••••">
                        <span class="password-toggle" 
                              style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer;"
                              onmousedown="showPassword()" 
                              onmouseup="hidePassword()" 
                              onmouseleave="hidePassword()">👁️</span>
                    </div>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
            <div class="auth-link">
                New here? <a href="/register.html">Create Account </a>
            </div>
        </div>
    </div>
    
    <script src="/js/api.js"></script>
    <script>
        const video = document.getElementById('bgVideo');
        if (video) video.playbackRate = 0.8;
        
        function showPassword() {
            document.getElementById('password').type = 'text';
        }
        
        function hidePassword() {
            document.getElementById('password').type = 'password';
        }
        
        function clearFields() {
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
            document.getElementById('password').type = 'password';
        }
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMsg');
            
            // Clear previous error
            errorDiv.style.display = 'none';
            errorDiv.textContent = '';
            
            try {
                const result = await API.login(email, password);
                
                if (result && result.token) {
                    // Login success - clear fields and redirect
                    clearFields();
                    window.location.href = '/dashboard.html';
                } else {
                    // Login failed - show error message
                    errorDiv.textContent = result || 'Invalid email or password';
                    errorDiv.style.display = 'block';
                    // Only clear password field
                    document.getElementById('password').value = '';
                }
            } catch (error) {
                // Login error - show error message
                errorDiv.textContent = 'Login failed. Please check your credentials.';
                errorDiv.style.display = 'block';
                // Only clear password field
                document.getElementById('password').value = '';
            }
        });
        
        if (API.getToken()) {
            window.location.href = '/dashboard.html';
        }
    </script>
</body>
</html>
