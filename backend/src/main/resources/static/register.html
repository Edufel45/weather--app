<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Weather App</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <video autoplay muted loop playsinline class="video-background" id="bgVideo">
        <source src="/videos/background.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>
    
    <div class="auth-container">
        <div class="auth-card">
            <h2>🌤️ Weather App</h2>
            <h3>Create Account</h3>
            <div id="errorMsg" class="error-msg"></div>
            <div id="successMsg" class="success-msg"></div>
            <form id="registerForm">
                <div class="form-group">
                    <label>👤 Name</label>
                    <input type="text" id="name" required placeholder="Your Name">
                </div>
                <div class="form-group">
                    <label>📧 Email</label>
                    <input type="email" id="email" required placeholder="your@email.com">
                </div>
                <div class="form-group password-group">
                    <label>🔒 Password</label>
                    <div style="position: relative;">
                        <input type="password" id="password" required placeholder="••••••">
                        <span class="password-toggle" 
                              style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer;"
                              onmousedown="showPassword()" 
                              onmouseup="hidePassword()" 
                              onmouseleave="hidePassword()">👁️</span>
                    </div>
                </div>
                <button type="submit" class="btn">✨ Register</button>
            </form>
            <div class="auth-link">
                Already have an account? <a href="/login.html">Login 🌟</a>
            </div>
        </div>
    </div>
    
    <script src="/js/api.js"></script>
    <script>
        const video = document.getElementById('bgVideo');
        if (video) video.playbackRate = 0.8;
        
        function showPassword() {
            document.getElementById('password').type = 'text';
        }
        
        function hidePassword() {
            document.getElementById('password').type = 'password';
        }
        
        function clearFields() {
            document.getElementById('name').value = '';
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
            document.getElementById('password').type = 'password';
        }
        
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMsg');
            const successDiv = document.getElementById('successMsg');
            
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            errorDiv.textContent = '';
            successDiv.textContent = '';
            
            try {
                const result = await API.register(name, email, password);
                
                if (result === 'User registered successfully!') {
                    successDiv.textContent = '✅ Registration successful! Redirecting to login...';
                    successDiv.style.display = 'block';
                    clearFields();
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 2000);
                } else {
                    errorDiv.textContent = result || 'Registration failed';
                    errorDiv.style.display = 'block';
                    document.getElementById('password').value = '';
                }
            } catch (error) {
                errorDiv.textContent = 'Registration failed. Please try again.';
                errorDiv.style.display = 'block';
                document.getElementById('password').value = '';
            }
        });
        
        if (API.getToken()) {
            window.location.href = '/dashboard.html';
        }
    </script>
</body>
</html>
