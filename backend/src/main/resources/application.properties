spring.application.name=weather-app
server.port=8080

# H2 In-Memory Database (working version)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
jwt.secret=mySecretKey12345678901234567890123456789012
jwt.expiration=86400000

# OpenWeatherMap
weather.api.key=fecc84e7d3769253ea2d0a427c3048c7
weather.api.url=http://api.openweathermap.org/data/2.5